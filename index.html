<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ohohOD · 창작 도구 모음</title>
    <meta name="description" content="ohohOD의 웹 도구 모음. 코코포리아 로그를 비주얼 노벨로 재생하는 VNLog Player, 마비노기 캐릭터 프로필을 만드는 시트메이커, TRPG 세션 로그를 결산 스토리로 만드는 커튼콜" />
    <meta name="theme-color" content="#f7efe3" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d64b7f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 3a6.36 6.36 0 0 0 9 9 9 9 0 1 1-9-9Z'/></svg>" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
      // 구버전 루트 시트메이커 앱으로 공유된 해시/쿼리 링크를 새 경로로 안내
      (function () {
        var l = window.location;
        if (l.hash.indexOf("#/") === 0) {
          l.replace("/sheetmaker/" + l.hash);
        } else if (l.search.indexOf("?/") === 0 || /[?&]p=\//.test(l.search)) {
          l.replace("/sheetmaker/" + l.search + l.hash);
        }
      })();
    </script>
    <style>
      /* ── STYLESEED.md 락: 라이트 스크랩북 · 화이트-베이지-핑크 · 핑크 단일 액센트 · soft 라운드 · 8px 그리드 ── */
      :root {
        --page: #f7efe3;
        --card: #fffdf8;
        --inner: #f2e8d8;
        --hairline: #e6d8c6;
        --ink-border: rgba(43, 36, 32, 0.12);
        --text-primary: #2b2420;
        --text-secondary: #5c4f42;
        --text-tertiary: #8a7866;
        --accent: #d64b7f;
        --accent-tint: rgba(214, 75, 127, 0.10);
        --paper-shadow: 0 1px 2px rgba(60, 45, 30, 0.06), 0 4px 14px rgba(60, 45, 30, 0.08);
        --paper-shadow-hover: 0 2px 4px rgba(60, 45, 30, 0.07), 0 8px 22px rgba(60, 45, 30, 0.11);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--page);
        /* 다이어리 도트 괘지 */
        background-image: radial-gradient(rgba(43, 36, 32, 0.05) 1px, transparent 1px);
        background-size: 22px 22px;
        color: var(--text-primary);
        line-height: 1.6;
        letter-spacing: 0;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 24px;
      }
      main { width: 100%; max-width: 560px; }

      .hero { margin-bottom: 40px; }
      .hero h1 {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .hero h1 .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--accent);
      }
      .hero p {
        margin-top: 8px;
        font-size: 16px;
        color: var(--text-tertiary);
      }

      .cards { display: flex; flex-direction: column; gap: 24px; }
      .card {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 16px;
        text-decoration: none;
        color: inherit;
        background: var(--card);
        border: 1px solid var(--ink-border);
        border-radius: 16px;
        padding: 24px;
        box-shadow: var(--paper-shadow);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      /* 다이어리에 비스듬히 붙인 종이 */
      .cards .card:nth-child(odd) { transform: rotate(-0.4deg); }
      .cards .card:nth-child(even) { transform: rotate(0.4deg); }
      /* 마스킹 테이프 — 홀수는 핑크, 짝수는 베이지 */
      .card::before {
        content: "";
        position: absolute;
        top: -11px;
        left: 26px;
        width: 66px;
        height: 22px;
        border-radius: 3px;
        background: rgba(214, 75, 127, 0.30);
        transform: rotate(-3deg);
      }
      .cards .card:nth-child(even)::before {
        left: auto;
        right: 26px;
        background: rgba(166, 138, 100, 0.30);
        transform: rotate(2.5deg);
      }
      .card:hover {
        transform: rotate(0deg) translateY(-2px);
        box-shadow: var(--paper-shadow-hover);
      }
      .card .icon {
        flex-shrink: 0;
        width: 44px; height: 44px;
        border-radius: 11px;
        display: flex; align-items: center; justify-content: center;
        background: var(--accent-tint);
        color: var(--accent);
      }
      .card .icon svg { width: 22px; height: 22px; }
      .card h2 {
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.01em;
        line-height: 1.35;
      }
      .card p {
        margin-top: 4px;
        font-size: 15px;
        color: var(--text-secondary);
      }
      .card .arrow {
        margin-left: auto;
        align-self: center;
        flex-shrink: 0;
        color: var(--text-tertiary);
        transition: transform 0.18s ease, color 0.18s ease;
      }
      .card:hover .arrow { transform: translateX(3px); color: var(--accent); }

      footer {
        margin-top: 40px;
        font-size: 14px;
        color: var(--text-tertiary);
      }
      footer a {
        color: var(--text-secondary);
        text-decoration: none;
        border-bottom: 1px solid var(--hairline);
        padding-bottom: 1px;
      }
      footer a:hover { color: var(--text-primary); border-color: var(--text-tertiary); }

      a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
        border-radius: 4px;
      }

      @media (max-width: 480px) {
        .card { flex-wrap: wrap; }
        .card .text { flex: 1 1 70%; }
      }

      @media (prefers-reduced-motion: reduce) {
        .card { transition: none; }
        .card:hover { transform: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <h1><span class="dot" aria-hidden="true"></span>ohohOD</h1>
        <p>TRPG와 창작을 위한 작은 웹 도구들</p>
      </div>

      <div class="cards">
        <a class="card" href="/vnlog/">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2" /><path d="M6 14h8" /><path d="M6 10h12" /></svg>
          </span>
          <span class="text">
            <h2>VNLog Player</h2>
            <p>코코포리아 로그를 비주얼 노벨 형식으로 재생·편집·내보내기</p>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
        </a>

        <a class="card" href="/sheetmaker/">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><path d="M14 2v6h6" /><path d="M8 13h8" /><path d="M8 17h5" /></svg>
          </span>
          <span class="text">
            <h2>마비 시트메이커</h2>
            <p>마비노기 캐릭터 시트와 프로필 이미지 생성기</p>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
        </a>

        <a class="card" href="/curtaincall/">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="4" /><circle cx="8.5" cy="8.5" r="0.5" fill="currentColor" /><circle cx="15.5" cy="8.5" r="0.5" fill="currentColor" /><circle cx="12" cy="12" r="0.5" fill="currentColor" /><circle cx="8.5" cy="15.5" r="0.5" fill="currentColor" /><circle cx="15.5" cy="15.5" r="0.5" fill="currentColor" /></svg>
          </span>
          <span class="text">
            <h2>커튼콜</h2>
            <p>막이 내린 뒤 숫자로 받는 무대 인사, TRPG 세션 로그 결산</p>
          </span>
          <svg class="arrow" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></svg>
        </a>
      </div>

      <footer>
        만든 사람 <a href="https://github.com/ohohOD" target="_blank" rel="noopener">GitHub @ohohOD</a>
      </footer>
    </main>
  </body>
</html>
