<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ohohOD — 창작 도구 모음</title>
    <meta name="description" content="ohohOD의 웹 도구 모음 — VNLog Player, 마비 시트메이커" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
      // 구버전 루트 시트메이커 앱으로 공유된 해시/쿼리 링크를 새 경로로 안내
      (function () {
        var l = window.location;
        if (l.hash.indexOf("#/") === 0) {
          l.replace("/sheetmaker/" + l.hash);
        } else if (l.search.indexOf("?/") === 0 || /[?&]p=\//.test(l.search)) {
          l.replace("/sheetmaker/" + l.search + l.hash);
        }
      })();
    </script>
    <style>
      :root {
        --bg: #0f1117;
        --bg-card: #171a23;
        --bg-card-hover: #1c2030;
        --border: #262b3b;
        --text: #e8eaf2;
        --text-dim: #9aa1b5;
        --accent-vn: #8b7cf6;
        --accent-sheet: #5eb3a1;
        --radius: 16px;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f6f7fa;
          --bg-card: #ffffff;
          --bg-card-hover: #f9f9fd;
          --border: #e3e6ef;
          --text: #23263a;
          --text-dim: #6d7488;
        }
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 20px;
        line-height: 1.6;
      }
      main { width: 100%; max-width: 640px; }
      .hero { margin-bottom: 40px; }
      .hero h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .hero h1 span { color: var(--accent-vn); }
      .hero p { color: var(--text-dim); margin-top: 8px; font-size: 1.02rem; }
      .cards { display: grid; gap: 16px; }
      .card {
        display: block;
        text-decoration: none;
        color: inherit;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px 26px;
        transition: border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      }
      .card:hover, .card:focus-visible {
        background: var(--bg-card-hover);
        border-color: var(--card-accent);
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
        outline: none;
      }
      .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
      .card-icon {
        width: 40px; height: 40px;
        border-radius: 11px;
        display: flex; align-items: center; justify-content: center;
        background: color-mix(in srgb, var(--card-accent) 16%, transparent);
        color: var(--card-accent);
        flex-shrink: 0;
      }
      .card-icon svg { width: 22px; height: 22px; }
      .card h2 { font-size: 1.18rem; font-weight: 700; letter-spacing: -0.01em; }
      .card .arrow {
        margin-left: auto;
        color: var(--text-dim);
        transition: transform 0.18s ease, color 0.18s ease;
      }
      .card:hover .arrow { transform: translateX(3px); color: var(--card-accent); }
      .card p { color: var(--text-dim); font-size: 0.95rem; }
      .tags { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
      .tag {
        font-size: 0.76rem;
        color: var(--text-dim);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 10px;
      }
      .card-vn { --card-accent: var(--accent-vn); }
      .card-sheet { --card-accent: var(--accent-sheet); }
      footer {
        margin-top: 44px;
        color: var(--text-dim);
        font-size: 0.88rem;
        display: flex;
        gap: 16px;
        align-items: center;
      }
      footer a { color: var(--text-dim); text-decoration: none; border-bottom: 1px solid var(--border); }
      footer a:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <h1>ohoh<span>OD</span></h1>
        <p>TRPG와 창작을 위한 작은 웹 도구들</p>
      </div>

      <div class="cards">
        <a class="card card-vn" href="/vnlog/">
          <div class="card-head">
            <div class="card-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 14h8"/><path d="M6 10h12"/><circle cx="17.5" cy="14.5" r="0.5" fill="currentColor"/></svg>
            </div>
            <h2>VNLog Player</h2>
            <span class="arrow" aria-hidden="true">→</span>
          </div>
          <p>코코포리아 로그 파일을 비주얼 노벨 형식으로 변환해 재생·편집·내보내기까지. 설치 없이 브라우저에서 바로.</p>
          <div class="tags">
            <span class="tag">코코포리아</span>
            <span class="tag">비주얼 노벨</span>
            <span class="tag">로그 플레이어</span>
          </div>
        </a>

        <a class="card card-sheet" href="/sheetmaker/">
          <div class="card-head">
            <div class="card-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg>
            </div>
            <h2>마비 시트메이커</h2>
            <span class="arrow" aria-hidden="true">→</span>
          </div>
          <p>마비노기 캐릭터 시트와 프로필 이미지를 만들고 꾸미는 생성기. 프리셋 저장과 이미지 내보내기 지원.</p>
          <div class="tags">
            <span class="tag">마비노기</span>
            <span class="tag">캐릭터 시트</span>
            <span class="tag">프로필 생성</span>
          </div>
        </a>
      </div>

      <footer>
        <a href="https://github.com/ohohOD" target="_blank" rel="noopener">GitHub @ohohOD</a>
      </footer>
    </main>
  </body>
</html>
