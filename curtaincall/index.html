:root {
  /* 화이트·베이지·핑크 라이트 램프 (사용자 지시 2026-07-23) — 순백/순검정 회피, 웜 틴트 그레이 */
  --page: #fbf8f4;
  --card: #ffffff;
  --inner: #f6efe7;
  --hairline: #eadfd3;
  --text-1: #3a2e27;
  --text-2: #5c4f42;
  --text-3: #7e6e5e;
  --accent: #d64b7f;
  --accent-tint: rgba(214, 75, 127, 0.10);
  --ok: #3f9142;
  --bad: #c73e3e;
  --font-body: "Pretendard Embedded", "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
  --font-display: "Black Han Sans Embedded", "Pretendard Embedded", "Pretendard", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--page);
  color: var(--text-1);
  line-height: 1.6;
  letter-spacing: -0.01em; /* 한글 기본 자간 — STYLESEED 락(0~-0.01em) 상한 */
  min-height: 100vh;
  padding: 40px 24px 80px;
}

main { max-width: 860px; margin: 0 auto; }

/* ── 헤더 & 신뢰 배지 ── */
header { margin-bottom: 32px; }
header h1 { display: flex; align-items: center; gap: 10px; font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
header h1 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
header .tagline { margin-top: 6px; color: var(--text-3); font-size: 15px; }

.trust {
  margin-top: 16px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent-tint);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 14px;
  color: var(--text-2);
}
.trust b { color: var(--accent); font-weight: 700; }

/* ── 드롭존 ── */
.drop {
  border: 2px dashed var(--hairline);
  border-radius: 16px;
  background: var(--card);
  padding: 48px 24px;
  text-align: center;
  color: var(--text-2);
  cursor: pointer;
  transition: border-color 0.18s ease, background 0.18s ease;
}
.drop:hover, .drop.over { border-color: var(--accent); background: var(--inner); }
.drop .big { font-size: 17px; font-weight: 700; color: var(--text-1); }
.drop .hint { margin-top: 8px; font-size: 14px; color: var(--text-3); }

/* ── 탭 ── */
nav.tabs { display: flex; gap: 8px; margin: 32px 0 16px; flex-wrap: wrap; }
nav.tabs button {
  font: inherit; font-size: 14px; font-weight: 600;
  color: var(--text-2);
  background: var(--card);
  border: 1px solid var(--hairline);
  border-radius: 10px;
  padding: 8px 16px;
  cursor: pointer;
}
nav.tabs button.active { color: var(--accent); border-color: var(--accent); background: var(--accent-tint); }

/* ── 카드/패널 ── */
/* 그룹 밖 간격(24) > 그룹 안 간격(12~16) — 근접성으로 묶음을 만든다 */
section.panel { background: var(--card); border: 1px solid var(--hairline); border-radius: 16px; padding: 24px; margin-bottom: 24px; }
section.panel h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.015em; }

/* 요약 탭 히어로 — 화면의 단일 초점. 숫자:단위 = 2:1 */
.hero-panel { padding: 40px 32px; }
.hero-label { font-size: 14px; font-weight: 600; color: var(--text-3); }
.hero-num { margin: 4px 0 8px; line-height: 1.1; }
.hero-num b { font-family: var(--font-display); font-weight: 400; font-size: 56px; color: var(--accent); letter-spacing: 0.01em; font-variant-numeric: tabular-nums; }
.hero-num span { font-size: 28px; font-weight: 700; color: var(--text-1); margin-left: 10px; letter-spacing: -0.01em; }
.hero-sub { font-size: 15px; color: var(--text-2); }

/* 결산 스토리 진입 — 좌측 설명 · 우측 액션 (중앙 정렬 상투형 회피) */
.story-launch { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.story-launch-text h2 { margin-bottom: 2px; }
.story-launch-text p { font-size: 14px; color: var(--text-3); }
.story-launch-actions { display: flex; gap: 8px; flex-shrink: 0; }

table.stats { width: 100%; border-collapse: collapse; font-size: 14px; }
table.stats th, table.stats td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--hairline); }
table.stats th { color: var(--text-3); font-weight: 600; font-size: 13px; }
table.stats td.num, table.stats th.num { text-align: right; font-variant-numeric: tabular-nums; }

.bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 14px; }
.bar-row .name { width: 120px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-row .bar { flex: 1; height: 10px; background: var(--inner); border-radius: 5px; overflow: hidden; }
.bar-row .bar i { display: block; height: 100%; background: var(--accent); border-radius: 5px; }
.bar-row .val { width: 56px; text-align: right; color: var(--text-3); font-variant-numeric: tabular-nums; }

.heatmap { display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; margin-top: 8px; }
.heatmap .cell { aspect-ratio: 1; border-radius: 3px; background: var(--inner); position: relative; }
.heatmap .cell span { position: absolute; inset: 0; border-radius: 3px; background: var(--accent); }
.heatmap-labels { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-3); margin-top: 4px; }

/* ── Recap 카드 ── */
.recap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.recap-card { background: var(--inner); border: 1px solid var(--hairline); border-radius: 12px; padding: 20px; }
.recap-card .title { font-size: 13px; color: var(--text-3); letter-spacing: 0.04em; }
.recap-card .value { font-family: var(--font-display); font-weight: 400; font-size: 22px; color: var(--accent); margin: 4px 0 2px; letter-spacing: 0.01em; }
.recap-card .sub { font-size: 14px; color: var(--text-2); }
.recap-card details { margin-top: 12px; font-size: 13px; color: var(--text-3); }
.recap-card details summary { cursor: pointer; list-style: none; }
.recap-card details summary::before { content: "∑ "; color: var(--accent); }
.recap-card details p { margin-top: 6px; padding: 8px 10px; background: var(--page); border-radius: 8px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; }

.highlight { border-left: 3px solid var(--accent); background: var(--inner); border-radius: 0 10px 10px 0; padding: 10px 14px; margin: 8px 0; font-size: 14px; }
.highlight .who { font-weight: 700; margin-right: 6px; }
.highlight.fumble { border-left-color: var(--bad); }
.highlight.crit { border-left-color: var(--ok); }

/* ── about ── */
.about p { margin: 10px 0; color: var(--text-2); font-size: 15px; }
.about code { background: var(--inner); border-radius: 6px; padding: 1px 6px; font-family: ui-monospace, Consolas, monospace; font-size: 13px; color: var(--accent); }

/* ── 액센트 선택 ── */
.accents { display: flex; gap: 8px; margin-top: 16px; }
.accents button { width: 22px; height: 22px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; }
.accents button.active { border-color: var(--text-1); }

/* ── 결산 스토리 ── */
.story-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: radial-gradient(1200px 800px at 80% 0%, var(--accent-tint), transparent 60%), #0b0d10;
  display: flex; align-items: center; justify-content: center;
}
.story-frame { position: relative; width: min(480px, 94vw); height: min(760px, 94vh); display: flex; flex-direction: column; }
.story-dots { display: flex; gap: 6px; padding: 18px 8px 0; }
.story-dots i { flex: 1; height: 3px; border-radius: 2px; background: var(--hairline); transition: background 0.2s ease; }
.story-dots i.on { background: var(--accent); }
.story-close {
  position: absolute; top: 34px; right: 4px; z-index: 3;
  background: none; border: 0; color: var(--text-3); cursor: pointer; padding: 8px;
}
.story-close:hover { color: var(--text-1); }
.story-stage { flex: 1; display: flex; align-items: center; }
.story-nav { position: absolute; top: 60px; bottom: 0; width: 34%; cursor: pointer; z-index: 2; }
.story-nav-prev { left: 0; }
.story-nav-next { left: 34%; width: 66%; }
.story-slide { width: 100%; padding: 0 20px 40px; }
.story-slide .fx { animation: story-up 0.55s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
@keyframes story-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
.story-kicker { color: var(--accent); font-size: 14px; font-weight: 800; letter-spacing: 0.22em; margin-bottom: 18px; }
.story-title {
  font-family: var(--font-display); font-weight: 400;
  font-size: 36px; line-height: 1.32; letter-spacing: 0.005em; /* BHS 자체 자간이 타이트 — 미세하게 풀어줌 */
}
.story-archetype {
  font-size: 48px;
  display: inline-block; transform: scaleX(0.96); transform-origin: left center; /* 장평 96% — 포스터 톤 */
}
.story-big { margin: 8px 0 14px; }
.story-big span {
  font-family: var(--font-display); font-weight: 400;
  font-size: 84px; letter-spacing: 0.01em; color: var(--accent); font-variant-numeric: tabular-nums;
  display: inline-block; transform: scaleX(0.96); transform-origin: left center; /* 장평 96% */
}
.story-big em { font-style: normal; font-size: 20px; font-weight: 700; color: var(--text-1); margin-left: 10px; letter-spacing: -0.01em; }
.story-sub { color: var(--text-2); font-size: 17px; margin-top: 12px; line-height: 1.7; }
.story-hint { color: var(--text-3); font-size: 13px; margin-top: 22px; }
.story-hours { display: flex; align-items: flex-end; gap: 4px; height: 80px; margin-top: 24px; }
.story-hours i { flex: 1; background: var(--accent); opacity: 0.85; border-radius: 3px 3px 0 0; min-height: 6px; }
.story-heroes { margin-top: 8px; display: flex; flex-direction: column; gap: 18px; }
.story-hero { display: flex; gap: 16px; align-items: center; }
.story-hero .rank { font-size: 30px; font-weight: 900; color: var(--accent); width: 34px; }
.story-hero .meta { flex: 1; display: flex; flex-direction: column; gap: 4px; }
.story-hero b { font-size: 20px; }
.story-hero small { color: var(--text-3); font-size: 14px; }
.story-hero .bar { height: 8px; background: var(--inner); border-radius: 4px; overflow: hidden; }
.story-hero .bar i { display: block; height: 100%; background: var(--accent); border-radius: 4px; }
.story-words { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; align-items: center; }
.story-words .chip { background: var(--inner); border: 1px solid var(--hairline); border-radius: 999px; padding: 8px 16px; font-weight: 700; }
.story-words .chip small { color: var(--accent); margin-left: 6px; font-size: 0.75em; }
.story-actions { display: flex; gap: 10px; margin-top: 28px; flex-wrap: wrap; }
.story-btn {
  font: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
  border: 1px solid var(--hairline); border-radius: 10px; padding: 12px 18px;
  background: var(--card); color: var(--text-1);
}
.story-btn.primary { background: var(--accent); border-color: var(--accent); color: #ffffff; }
.story-btn:disabled { opacity: 0.6; cursor: wait; }
.story-formula { margin-top: 26px; font-size: 13px; color: var(--text-3); }
.story-formula summary { cursor: pointer; list-style: none; }
.story-formula summary::before { content: "∑ "; color: var(--accent); }
.story-formula p { margin-top: 6px; padding: 8px 10px; background: rgba(0,0,0,0.3); border-radius: 8px; font-family: ui-monospace, Consolas, monospace; font-size: 12px; }
@media (prefers-reduced-motion: reduce) { .story-slide .fx { animation: none; } }

/* ── 스토리 테마 변수 (--st-a/--st-b는 JS가 아키타입 그라디언트로 주입) ── */
.story-overlay {
  --st-a: #6366f1; --st-b: #a78bfa;
  --st-ink: #ffffff; --st-sub: rgba(255,255,255,0.78); --st-faint: rgba(255,255,255,0.55);
  --st-panel: rgba(255,255,255,0.16); --st-stroke: rgba(255,255,255,0.30); --st-track: rgba(255,255,255,0.28);
}
.story-overlay[data-theme="glass"] {
  --st-ink: #f2f4f8; --st-sub: rgba(235,240,248,0.72); --st-faint: rgba(235,240,248,0.50);
  --st-panel: rgba(255,255,255,0.09); --st-stroke: rgba(255,255,255,0.22); --st-track: rgba(255,255,255,0.18);
}
.story-overlay[data-theme="scrapbook"] {
  --st-ink: #2b2420; --st-sub: rgba(43,36,32,0.72); --st-faint: rgba(43,36,32,0.50);
  --st-panel: rgba(255,253,248,0.92); --st-stroke: rgba(43,36,32,0.14); --st-track: rgba(43,36,32,0.14);
}

.story-overlay .story-kicker { color: var(--st-ink); }
.story-overlay[data-theme="scrapbook"] .story-kicker { color: var(--st-a); }
.story-overlay .story-title, .story-overlay .story-archetype { color: var(--st-ink); }
.story-overlay .story-big span, .story-overlay .story-big em { color: var(--st-ink); }
.story-overlay[data-theme="glass"] .story-big span,
.story-overlay[data-theme="glass"] .story-archetype {
  background: linear-gradient(90deg, var(--st-a), var(--st-b));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.story-overlay .story-sub { color: var(--st-sub); }
.story-overlay .story-hint { color: var(--st-faint); }
.story-overlay .story-dots i { background: var(--st-track); }
.story-overlay .story-dots i.on { background: var(--st-ink); }
.story-overlay .story-close { color: var(--st-faint); }
.story-overlay .story-close:hover { color: var(--st-ink); }
.story-overlay .story-hours i { background: var(--st-ink); }
.story-overlay .story-hero .rank { color: var(--st-ink); }
.story-overlay[data-theme="scrapbook"] .story-hero .rank { color: var(--st-a); }
.story-overlay .story-hero b { color: var(--st-ink); }
.story-overlay .story-hero small { color: var(--st-faint); }
.story-overlay .story-hero .bar { background: var(--st-track); }
.story-overlay .story-hero .bar i { background: var(--st-ink); }
.story-overlay[data-theme="scrapbook"] .story-hero .bar i { background: var(--st-a); }
.story-overlay .story-words .chip { background: var(--st-panel); border-color: var(--st-stroke); color: var(--st-ink); }
.story-overlay .story-words .chip small { color: var(--st-sub); }
.story-overlay .story-btn { background: var(--st-panel); border-color: var(--st-stroke); color: var(--st-ink); }
.story-overlay .story-btn.primary { background: var(--st-ink); border-color: var(--st-ink); color: #16130d; }
.story-overlay[data-theme="glass"] .story-btn.primary { background: linear-gradient(90deg, var(--st-a), var(--st-b)); border-color: transparent; color: #ffffff; }
.story-overlay[data-theme="scrapbook"] .story-btn.primary { color: #f2e8d6; }
.story-overlay .story-formula { color: var(--st-faint); }
.story-overlay .story-formula summary::before { color: var(--st-sub); }
.story-overlay .story-formula p { background: rgba(0,0,0,0.25); }
.story-overlay[data-theme="scrapbook"] .story-formula p { background: rgba(0,0,0,0.06); }

/* ── 리캡 테마 선택 칩 (대시보드) ── */
.theme-pick { display: flex; gap: 8px; justify-content: center; margin-top: 14px; flex-wrap: wrap; }
.theme-pick button {
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--text-2); background: var(--inner);
  border: 1px solid var(--hairline); border-radius: 999px; padding: 6px 14px;
  display: inline-flex; align-items: center; gap: 8px;
}
.theme-pick button.active { color: var(--text-1); border-color: var(--accent); background: var(--accent-tint); }
.theme-pick .swatch { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--hairline); }

footer { margin-top: 40px; text-align: center; color: var(--text-3); font-size: 14px; }
footer a { color: var(--accent); text-decoration: none; }
footer .credit { margin-top: 6px; font-size: 13px; color: var(--text-3); }

/* 포커스 링 — 모든 인터랙티브 요소, 라이트/다크 공통 가시성 */
:where(button, a, input, summary, [tabindex]):focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 6px;
}

@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
